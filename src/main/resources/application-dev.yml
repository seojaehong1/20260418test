spring:
  datasource:
    url: jdbc:mysql://localhost:3306/safecall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: safecall
    password: ${DB_PASSWORD:safecall1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jwt:
    secret: dev-local-secret-key-not-for-production-at-least-256-bits-long-enough-for-safecall